name: Update Fear and Greed Data

on:
  schedule:
    # 每天 UTC 时间凌晨 0点执行 (北京时间早上8点)，确保抓到美股收盘数据
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许在网页上手动点击运行

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests
          
      - name: Run update script
        run: python update_fear_greed.py
        
      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fng_data.json
          # 检查如果有数据更新，就自动 Commit 并 Push
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update fear and greed data" && git push)
