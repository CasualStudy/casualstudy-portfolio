name: Update News Radar

on:
  schedule:
    # Run every 30 minutes from 13:00 to 22:00 UTC, Mon-Fri
    # (9:00 AM to 6:00 PM Eastern Time)
    - cron: '*/30 13-22 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser

      - name: Run news update script
        run: python update_news_radar.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/news_radar.json
          git commit -m "Auto-update News Radar data" || echo "No changes to commit"
          git push
