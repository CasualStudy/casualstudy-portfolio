name: Update Gap Study Data

on:
  schedule:
    # 每天 14:00 UTC 运行 (对应美东的 10:00 AM，也就是开盘后半小时，最稳妥的时间)
    - cron: '0 14 * * 1-5'
  workflow_dispatch: # 这个允许您手动随时点击运行

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance python-dateutil tzdata
          
      - name: Run update script
        run: python update_gap_study.py
        
      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gap_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update index gap study data" && git push)
