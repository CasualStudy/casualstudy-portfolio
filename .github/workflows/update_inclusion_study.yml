name: Update Inclusion Study Data

on:
  schedule:
    # 每个月的 1 号 00:00 UTC 运行
    - cron: '0 0 1 * *'
  workflow_dispatch: # 允许手动随时点击运行

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests lxml html5lib beautifulsoup4 python-dateutil tzdata
          
      - name: Run update script
        run: python update_inclusion_study.py
        
      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/inclusion_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update inclusion study data" && git push)
