<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classified - Quant Command Center</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="ui-enhance.css">
    <link rel="stylesheet" href="quant-admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="libs/lucide.min.js"></script>
</head>
<body>
    <!-- Rich background wallpaper -->
    <div class="wallpaper">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
    </div>

    <!-- Lock Screen Overlay -->
    <div id="lock-screen" class="lock-screen active">
        <div class="lock-box glass-panel">
            <i data-lucide="lock" class="lock-icon"></i>
            <h2>System Locked</h2>
            <p>Commander Access Required</p>
            <input type="password" id="passcode-input" placeholder="Enter Token or Passcode" autofocus>
            <div style="margin-top: 10px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <input type="checkbox" id="remember-token" style="cursor: pointer;">
                <label for="remember-token" style="color: var(--text-secondary); font-size: 0.85rem; cursor: pointer;">Remember Token</label>
            </div>
            <button id="unlock-btn" class="btn primary-btn">Authenticate</button>
            <p id="error-msg" class="error-msg"></p>
        </div>
    </div>

    <!-- Main Dashboard (Hidden by default) -->
    <div id="dashboard-content" class="dashboard-content hidden">
        <nav class="glass-nav">
            <div class="nav-content">
                <span class="logo" style="display: flex; align-items: center; gap: 8px;"><i data-lucide="terminal"></i> Quant Hub Admin</span>
                            <div class="nav-links">
                <a href="index.html#analysis" class="lang-text" data-en="Analysis" data-zh="数据分析">Analysis</a>
                <a href="index.html#projects" class="lang-text" data-en="Projects" data-zh="项目">Projects</a>
                <button id="lang-toggle" class="btn glass-btn lang-text" data-en="中" data-zh="EN" style="padding: 0.4rem 0.8rem; font-size: 0.9rem; margin-left: 1rem; cursor: pointer;">中</button>
                <button id="lock-sys-btn" class="btn glass-btn" style="padding: 0.4rem 0.8rem; font-size: 0.9rem; margin-left: 0.5rem; cursor: pointer; color: #ff4444;"><i data-lucide="lock" style="width:14px; height:14px; display:inline-block; vertical-align:middle;"></i> Lock</button>
            </div>
            </div>
        </nav>

        <main style="padding-top: 100px; padding-bottom: 50px; max-width: 1200px; margin: 0 auto; padding-inline: 5%;">
            <div class="dashboard-header">
                <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Intelligence Feed <span id="stats-total" style="font-size: 1rem; color: var(--text-secondary); font-weight: normal; margin-left: 10px;"></span></h1>
                <p style="color: var(--text-secondary); margin-bottom: 20px;">Latest academic papers, GitHub replications, and SSRN factors.</p>
                
                <div class="dataset-toggle" style="display: flex; gap: 10px; margin-bottom: 20px; max-width: 800px;">
                    <button id="btn-live-feed" class="btn primary-btn" style="flex: 1; justify-content: center; border-radius: 10px;">Live Feed (Latest)</button>
                    <button id="btn-hall-of-fame-open" class="btn glass-btn" style="flex: 1; justify-content: center; border-radius: 10px; opacity: 0.6;">Hall of Fame (Open)</button>
                    <button id="btn-hall-of-fame" class="btn glass-btn" style="flex: 1; justify-content: center; border-radius: 10px; opacity: 0.6;">Hall of Fame (Closed)</button>
                </div>
                
                <div class="controls-bar glass-panel" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-radius: 20px; margin-bottom: 30px; flex-wrap: wrap; gap: 15px;">
                    <div class="filters" style="display: flex; gap: 10px;">
                        <button class="filter-btn active" data-source="All">All</button>
                        <button class="filter-btn" data-source="GitHub">GitHub Repo</button>
                        <button class="filter-btn" data-source="arXiv">arXiv Paper</button>
                        <button class="filter-btn" data-source="OpenAlex">SSRN/OpenAlex</button>
                    </div>
                    
                    <div class="controls" style="display: flex; gap: 15px; align-items: center;">
                        <button id="fetch-more-btn" class="btn glass-btn" style="padding: 6px 12px; display: flex; align-items: center; gap: 5px; color: #00c6ff; border-color: rgba(0,198,255,0.3);">
                            <i data-lucide="radar" style="width:16px; height:16px;"></i> 扫描新论文
                        </button>
                        <button id="openalex-deep-btn" class="btn glass-btn" style="padding: 6px 12px; display: flex; align-items: center; gap: 5px; color: #bf9fff; border-color: rgba(191,159,255,0.3);">
                            <i data-lucide="library" style="width:16px; height:16px;"></i> OpenAlex 深度挖掘
                        </button>
                        <div class="sort-controls" style="display: flex; gap: 10px; align-items: center;">
                            <span style="font-size: 0.85rem; color: var(--text-secondary);"><i data-lucide="arrow-up-down" style="width:14px; height:14px;"></i> Sort by:</span>
                            <select id="sort-select" class="glass-input" style="background: rgba(255,255,255,0.5); border: var(--glass-border); border-radius: 10px; padding: 6px 12px; outline: none; font-family: inherit; color: var(--text-primary);">
                                <option value="score_desc">P-Score (High to Low)</option>
                                <option value="score_asc">P-Score (Low to High)</option>
                                <option value="citations_desc">Citations (High to Low)</option>
                                <option value="citations_asc">Citations (Low to High)</option>
                                <option value="date_desc">Date (Newest First)</option>
                                <option value="date_asc">Date (Oldest First)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="quant-list" id="papers-container" style="display: flex; flex-direction: column; gap: 16px;">
                <!-- List items injected by JS -->
            </div>
        </main>
    </div>

    <script src="quant-admin.js?v=11"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
