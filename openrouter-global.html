<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global AI Economy - CasualStudy</title>
    <meta name="description" content="OpenRouter Global Model Revenue Rankings.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        .chart-container {
            width: 100%;
            height: 600px;
            margin-top: 2rem;
            position: relative;
            z-index: 2;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
            position: relative;
            z-index: 2;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin: 0.5rem 0;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @media (prefers-color-scheme: dark) {
            .stat-card {
                background: rgba(0, 0, 0, 0.2);
            }
        }
    </style>
</head>
<body>
    <div class="wallpaper">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
    </div>
    
    <nav class="glass-nav" id="main-nav">
        <div class="nav-content">
            <a href="index.html" class="logo lang-text" data-en="CasualStudy" data-zh="随意研究">CasualStudy</a>
            <div class="nav-links">
                <a href="index.html#analysis" class="lang-text" data-en="Analysis" data-zh="数据分析">Analysis</a>
                <a href="index.html#projects" class="lang-text" data-en="Projects" data-zh="项目">Projects</a>
                <button id="lang-toggle" class="btn glass-btn lang-text" data-en="中" data-zh="EN" style="padding: 0.4rem 0.8rem; font-size: 0.9rem; margin-left: 1rem; cursor: pointer;">中</button>
            </div>
            <a href="https://x.com/casualstudy023" target="_blank" class="nav-action" id="nav-follow-btn">
                <i data-lucide="twitter"></i> <span class="lang-text" data-en="Follow" data-zh="关注">Follow</span>
            </a>
        </div>
    </nav>

    <main>
        <section class="section-container" style="padding-top: 2rem;">
            <div class="glass-panel" style="padding: 3rem; margin-top: 2rem; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px) saturate(1.2); -webkit-backdrop-filter: blur(20px) saturate(1.2);">
                <div class="section-header" style="text-align: left; margin-bottom: 2rem;">
                    <h2 class="lang-text" data-en="Global AI Economy Tracker" data-zh="全球 AI 大模型流水监控">Global AI Economy Tracker</h2>
                    <p class="lang-text" data-en="Estimated daily revenue across top models routed through OpenRouter." data-zh="根据 OpenRouter 平台排名前列大模型的全网日调用量估算的真实流水大盘。">Estimated daily revenue across top models routed through OpenRouter.</p>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label lang-text" data-en="Latest Date (UTC)" data-zh="更新日期 (UTC)">Latest Date (UTC)</div>
                        <div class="stat-value" id="stat-date">--</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label lang-text" data-en="Top Grossing Model" data-zh="当日吸金冠军">Top Grossing Model</div>
                        <div class="stat-value" id="stat-top-model" style="font-size: 1.5rem;">--</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label lang-text" data-en="Est. Daily Market Rev" data-zh="估算大盘日流水">Est. Daily Market Rev</div>
                        <div class="stat-value" id="stat-total-rev">--</div>
                    </div>
                </div>

                <!-- Market Trend Chart -->
                <div class="trend-header" style="display: flex; justify-content: flex-end; align-items: center; margin-top: 3rem; margin-bottom: -2rem; padding: 0 1rem; position: relative; z-index: 10;">
                    <div class="toggle-group" id="timeframe-toggle" style="display: flex; gap: 0.25rem; background: rgba(128, 128, 128, 0.15); padding: 0.25rem; border-radius: 8px;">
                        <button class="btn glass-btn active" data-tf="daily" style="padding: 0.3rem 0.8rem; border-radius: 6px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.2);">Daily</button>
                        <button class="btn glass-btn" data-tf="weekly" style="padding: 0.3rem 0.8rem; border-radius: 6px; font-size: 0.85rem; border: 1px solid transparent; background: transparent; box-shadow: none;">Weekly</button>
                    </div>
                </div>
                <div id="trend-chart" class="chart-container" style="height: 400px; margin-top: 1rem;"></div>
                
                <!-- Today's Top Models Bar Chart -->
                <div id="ranking-chart" class="chart-container" style="margin-top: 3rem;"></div>
            </div>
        </section>
    </main>

    <footer class="glass-nav glass-footer" id="site-footer">
        <div class="footer-content">
            <p class="lang-text" data-en="&copy; 2024 CasualStudy. All rights reserved." data-zh="&copy; 2024 随意研究. 保留所有权利。">&copy; 2024 CasualStudy. All rights reserved.</p>
            <div class="footer-socials">
                <a href="https://x.com/casualstudy023" target="_blank" aria-label="X (Twitter)">
                    <i data-lucide="twitter"></i>
                </a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="openrouter-global.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
